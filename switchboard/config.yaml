---
name: Switchboard
version: "0.26.0"
slug: switchboard
description: >-
  Self-hosted Asterisk PBX for analog home phones via a Grandstream GXW4216 V2.
  Room-to-room calling now, SIP trunk outside-line ready. G.711 u-law only,
  end to end (no HD/Opus, no transcoding).
url: https://github.com/tesseractAZ/Switchboard/tree/main/switchboard
arch:
  - amd64
  - aarch64
init: false
host_network: true
apparmor: true
# Supervisor API access — auto-detect the Home Assistant timezone (talking clock
# / wake-up calls). Home Assistant Core API access — the voice/TUI/GUI home-
# automation feature reads light states and calls light.turn_on/turn_off via the
# Supervisor proxy with the add-on's SUPERVISOR_TOKEN (no separate credential).
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:phone-classic
panel_title: Switchboard
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
options:
  log_level: info
  rtp_start: 10000
  rtp_end: 10200
  operator:
    enabled: true
  operator_synonyms: []
  stt_resident: true
  call_quality_alerts: true
  link_health_enabled: true
  link_health_interval: 300
  link_health_alerts: true
  announce_token: ""
  console_enabled: true
  console_port: 2300
  console_bind: "0.0.0.0"
  console_web_enabled: true
  console_web_port: 8100
  console_web_bind: ""
  timezone: ""
  clock_enabled: true
  clock_ext: "41"
  wakeup_enabled: true
  wakeup_ext: "42"
  wakeup_ring_seconds: 60
  automation_enabled: true
  automation_ext: "43"
  page_enabled: true
  page_ext: "44"
  mwi_enabled: true
  status_enabled: true
  status_ext: "45"
  directory_enabled: true
  directory_ext: "411"
  announce_enabled: true
  announce_ext: "46"
  announce_players:
    - media_player.west_hallway
    - media_player.guest_thermostat
  announce_tts_engine: "tts.piper"
  wakeup_scene: ""
  wakeup_weather: true
  wakeup_calendar: ""
  rooms:
    - ext: "101"
      name: Kitchen
      secret: change-me-101
    - ext: "102"
      name: Living Room
      secret: change-me-102
  trunk:
    enabled: false
    provider_host: ""
    port: 5060
    username: ""
    secret: ""
    from_user: ""
    from_domain: ""
    outbound_caller_id: ""
    inbound_ext: ""
    dial_prefix: "9"
    registns: true
schema:
  log_level: list(trace|debug|info|notice|warning|error|critical)
  rtp_start: int(1024,65535)
  rtp_end: int(1024,65535)
  operator:
    enabled: bool?
  operator_synonyms:
    - ext: str
      phrases:
        - str
  stt_resident: bool?
  call_quality_alerts: bool?
  link_health_enabled: bool?
  link_health_interval: int(30,86400)?
  link_health_alerts: bool?
  announce_token: str?
  console_enabled: bool?
  console_port: port?
  console_bind: str?
  console_web_enabled: bool?
  console_web_port: port?
  console_web_bind: str?
  timezone: str?
  clock_enabled: bool?
  clock_ext: str?
  wakeup_enabled: bool?
  wakeup_ext: str?
  wakeup_ring_seconds: int(10,600)?
  automation_enabled: bool?
  automation_ext: str?
  page_enabled: bool?
  page_ext: str?
  mwi_enabled: bool?
  status_enabled: bool?
  status_ext: str?
  directory_enabled: bool?
  directory_ext: str?
  announce_enabled: bool?
  announce_ext: str?
  announce_players:
    - str?
  announce_tts_engine: str?
  wakeup_scene: str?
  wakeup_weather: bool?
  wakeup_calendar: str?
  rooms:
    - ext: match(^[0-9]{2,6}$)
      name: str
      secret: password
  trunk:
    enabled: bool
    provider_host: str?
    port: port?
    username: str?
    secret: password?
    from_user: str?
    from_domain: str?
    outbound_caller_id: str?
    inbound_ext: str?
    dial_prefix: str?
    registns: bool?
