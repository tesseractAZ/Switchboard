---
name: Switchboard
version: "0.1.3"
slug: switchboard
description: >-
  Self-hosted Asterisk PBX for analog home phones via a Grandstream GXW4216 V2.
  Room-to-room calling now, SIP trunk outside-line ready. G.711/G.722/Opus.
url: https://github.com/tesseractAZ/Switchboard/tree/main/switchboard
codenotary: epaschal@outlook.com
arch:
  - amd64
  - aarch64
  - armv7
init: false
host_network: true
apparmor: true
ingress: true
ingress_port: 8099
panel_icon: mdi:phone-classic
panel_title: Switchboard
map:
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
options:
  log_level: info
  rtp_start: 10000
  rtp_end: 10200
  codecs:
    - ulaw
    - alaw
    - g722
    - opus
  rooms:
    - ext: "101"
      name: Kitchen
      secret: change-me-101
    - ext: "102"
      name: Living Room
      secret: change-me-102
  trunk:
    enabled: false
    provider_host: ""
    port: 5060
    username: ""
    secret: ""
    from_user: ""
    from_domain: ""
    outbound_caller_id: ""
    dial_prefix: "9"
    registns: true
schema:
  log_level: list(trace|debug|info|notice|warning|error|critical)
  rtp_start: int(1024,65535)
  rtp_end: int(1024,65535)
  codecs:
    - list(ulaw|alaw|g722|opus|g729|gsm|slin16)
  rooms:
    - ext: match(^[0-9]{2,6}$)
      name: str
      secret: password
  trunk:
    enabled: bool
    provider_host: str?
    port: port?
    username: str?
    secret: password?
    from_user: str?
    from_domain: str?
    outbound_caller_id: str?
    dial_prefix: str?
    registns: bool?
