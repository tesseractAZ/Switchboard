;; Switchboard module loader.
;; A SIP/PJSIP PBX in a container has no sound card, no telephony hardware and
;; no desktop audio, so we autoload everything EXCEPT the modules that only
;; probe for that hardware (they produce the ALSA/JACK error spam) plus a few
;; deprecated/unused backends. This keeps the log clean and trims memory.

[modules]
autoload = yes

; No sound card / desktop audio in the container (source of ALSA + JACK errors).
noload = chan_alsa.so
noload = chan_console.so

; No analog/digital telephony cards passed into the container.
noload = chan_dahdi.so

; Deprecated ADSI (analog display) modules we don't use.
noload = res_adsi.so
noload = app_adsiprog.so
noload = app_getcpeid.so

; Optional CDR/CEL SQLite custom backends we don't configure.
noload = cdr_sqlite3_custom.so
noload = cel_sqlite3_custom.so
